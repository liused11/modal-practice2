<ion-content>
  <div
    class="min-h-screen bg-gray-100 flex items-center justify-center px-6 sm:px-8 lg:px-10"
  >
    <ion-card class="w-full max-w-md rounded-2xl shadow-lg">
      <ion-card-header class="text-center py-4">
        <ion-card-title class="text-xl font-bold text-gray-800">
          Welcome
        </ion-card-title>
        <ion-card-subtitle class="text-gray-500">
          Click below to open the modal
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content class="py-6">
        <ion-button
          (click)="openModalInformation()"
          color="primary"
          expand="block"
          class="rounded-md shadow-sm"
        >
          Open Modal
        </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
